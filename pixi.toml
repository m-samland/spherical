[workspace]
name = "spherical"
description = "VLT/SPHERE Instrument Calibration Pipeline and Database"
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64", "osx-arm64", "osx-64"]

# ──────────────────────────────────────────────
# Core dependencies (mirrors [project.dependencies] in pyproject.toml)
# ──────────────────────────────────────────────
[dependencies]
python = ">=3.11,<3.14"
numpy = ">=2.0,<3.0"
matplotlib = ">3.0,<4.0"
pandas = ">2.0,<=3.0"
astropy = ">=7.1,<8.0"
astroquery = ">=0.4.8,<=0.4.10"
tqdm = "*"
natsort = "*"
healpy = "*"
pymysql = ">=1.1.2,<2"

# Editable install of the package itself
[pypi-dependencies]
spherical = { path = ".", editable = true }

# ──────────────────────────────────────────────
# Feature: pipeline (published versions from git, for regular users)
# ──────────────────────────────────────────────
[feature.pipeline.dependencies]
numpy = ">=2.0,<=2.2"  # charis requires numpy<=2.2
dill = "*"
scikit-image = "*"
photutils = "*"
scipy = ">=1.9.3"

[feature.pipeline.pypi-dependencies]
charis = { git = "https://github.com/PrincetonUniversity/charis-dep" }
trap = { git = "https://github.com/m-samland/trap" }

# ──────────────────────────────────────────────
# Feature: dev-pipeline (local editable installs, for developers)
# Uses same conda deps as pipeline but installs charis/trap from
# local sibling directories (../charis-dep/ and ../trap/) in editable mode.
# Cannot be combined with feature.pipeline in the same environment.
# ──────────────────────────────────────────────
[feature.dev-pipeline.dependencies]
numpy = ">=2.0,<=2.2"  # charis requires numpy<=2.2
dill = "*"
scikit-image = "*"
photutils = "*"
scipy = ">=1.9.3"

[feature.dev-pipeline.pypi-dependencies]
charis = { path = "../charis-dep", editable = true }
trap = { path = "../trap", editable = true }

# ──────────────────────────────────────────────
# Feature: notebook
# ──────────────────────────────────────────────
[feature.notebook.dependencies]
ipython = "*"
jupyterlab = "*"
ipywidgets = "*"  # enables tqdm.auto widget progress bars in JupyterLab
seaborn = "*"

# ──────────────────────────────────────────────
# Feature: docs
# ──────────────────────────────────────────────
[feature.docs.dependencies]
sphinx = "*"
sphinx-automodapi = "*"
numpydoc = "*"

# ──────────────────────────────────────────────
# Feature: test
# ──────────────────────────────────────────────
[feature.test.dependencies]
pytest = "*"
pytest-cov = "*"
pytest-doctestplus = "*"
codecov = "*"
ruff = "*"

# ──────────────────────────────────────────────
# Environments
# ──────────────────────────────────────────────
[environments]
default = { solve-group = "default" }
pipeline = { features = ["pipeline"], solve-group = "pipeline" }
notebook = { features = ["notebook"], solve-group = "default" }
docs = { features = ["docs"], solve-group = "default" }
test = { features = ["test"], solve-group = "default" }
dev = { features = ["dev-pipeline", "notebook", "test"], solve-group = "dev" }
# Self-contained dev env: same as `dev` but installs charis/trap from git instead of
# local siblings. Use when ../charis-dep/ and ../trap/ are not checked out.
dev-git = { features = ["pipeline", "notebook", "test"], solve-group = "pipeline" }

# ──────────────────────────────────────────────
# Tasks
# ──────────────────────────────────────────────
[feature.pipeline.tasks]
ipython = "ipython"

[feature.dev-pipeline.tasks]
ipython = "ipython"

[feature.test.tasks]
test = "pytest"
lint = "ruff check src/"
format = "ruff format src/"
format-check = "ruff format --check src/"

[feature.docs.tasks]
docs = "sphinx-build docs/ docs/_build"
